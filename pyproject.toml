[tool.pytest.ini_options]
pythonpath = ["backend"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "F",      # Pyflakes (unused imports, unused vars, undefined names)
    "E", "W", # Pycodestyle (style violations)
    "I",      # Isort (imports sorting/formatting)
    "B",      # Flake8-bugbear (potential bugs, loops, etc.)
    "C90",    # McCabe Complexity (redundant CCN check)
]
ignore = ["E501", "B905"]

[tool.ruff.lint.mccabe]
max-complexity = 20


