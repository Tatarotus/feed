name: CI Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov radon ruff mutmut

    - name: 1. File Size Audit
      run: ./scripts/check_file_size.sh

    - name: 2. Cyclomatic Complexity Audit
      run: ./scripts/check_complexity.sh

    - name: 3. Ruff Lint Audit
      run: ruff check backend/app backend/main.py

    - name: 4. Unit Test & Coverage Audit
      run: ./scripts/check_coverage.sh

    - name: 5. Mutation Testing Audit
      run: ./scripts/run_mutation.sh
